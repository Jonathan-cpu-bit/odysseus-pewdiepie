name: "Build Odysseus for All OS"

on:
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-22.04

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Create the Dark Mode Handoff UI
        working-directory: ./tauri-app
        shell: bash
        run: |
          mkdir -p ui
          echo "<!DOCTYPE html><html><head><title>Odysseus</title><style>body{background:#131313;margin:0;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}.spinner{border:3px solid rgba(255,255,255,0.1);border-radius:50%;border-top:3px solid #fff;width:30px;height:30px;animation:spin 1s linear infinite;}@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}</style></head><body><div class='spinner'></div><script>let check=setInterval(()=>{fetch('http://127.0.0.1:7860/',{mode:'no-cors'}).then(()=>{clearInterval(check);window.location.href='http://127.0.0.1:7860/';}).catch(()=>{});},150);</script></body></html>" > ui/index.html

      - name: Patch Cross-Platform Rust Code
        working-directory: ./tauri-app/src-tauri/src
        shell: bash
        run: |
          node -e "const fs = require('fs'); let code = fs.readFileSync('main.rs', 'utf8'); code = code.replace('use tauri::{ActivationPolicy, ', 'use tauri::{'); code = code.replace('use std::process::Command;', 'use std::process::Command;\n#[cfg(target_os = \"macos\")]\nuse tauri::ActivationPolicy;'); fs.writeFileSync('main.rs', code);"

      - name: Fix NPM Tauri Scripts
        working-directory: ./tauri-app
        shell: bash
        run: |
          npm install -D @tauri-apps/cli@1
          npm pkg set scripts.tauri="tauri"

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          tagName: v0.1.${{ github.run_number }}
          releaseName: "Odysseus v0.1.${{ github.run_number }}"
          releaseDraft: false
          prerelease: false
